<style>
:root{
  /* void 世界 · css/tokens.css */
  --void:#0e0b1a;
  --aurora-v:#c471f5; --aurora-p:#fa71cd; --aurora-b:#4facfe;
  --ash-0:rgba(240,232,220,0.94); --ash-1:rgba(240,232,220,0.78);
  --ash-2:rgba(240,232,220,0.60); --ash-3:rgba(240,232,220,0.55);
  --ash-4:rgba(240,232,220,0.22);
  /* paper 世界 · vessel.html */
  --paper:#faf8f3; --ink:#1a1816; --rust:#8b3a1f; --gold:#a8895c;
  --ink-1:rgba(26,24,22,0.78); --ink-2:rgba(26,24,22,0.55); --ink-4:rgba(26,24,22,0.22);
  /* 字 */
  --serif:'Shippori Mincho','Fraunces','Noto Serif TC',serif;
  --serif-en:'Fraunces','Shippori Mincho',serif;
  --t-serif:'Noto Serif TC','Cormorant Garamond',serif;
  --t-serif-en:'Cormorant Garamond','Noto Serif TC',serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
  /* 鏡面位置 */
  --seam:50%;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--void);overflow:hidden;font-family:var(--serif);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}

/* ═══ 鏡面結構：兩個全幅世界，各被 seam 裁切 ═══ */
.mirror{position:fixed;inset:0;}
.world{position:absolute;inset:0;}
.world-void{clip-path:inset(0 calc(100% - var(--seam)) 0 0);background:var(--void);}
.world-paper{clip-path:inset(0 0 0 var(--seam));background:var(--paper);}

/* 縫線本身 */
.seam-line{position:absolute;top:0;bottom:0;left:var(--seam);width:1px;z-index:30;
  background:linear-gradient(to bottom,transparent 0%,rgba(196,113,245,0.4) 30%,rgba(168,137,92,0.5) 70%,transparent 100%);
  pointer-events:none;}
.seam-line::after{content:'';position:absolute;top:0;bottom:0;left:-20px;width:40px;
  background:linear-gradient(to bottom,transparent 20%,rgba(196,113,245,0.05) 45%,rgba(168,137,92,0.06) 60%,transparent 85%);
  filter:blur(12px);}

/* ═══ 兩個世界共用的幾何（瓶置中、字各居半側） ═══ */
.stage{position:absolute;inset:0;}

/* 中央的瓶 —— 兩個世界各畫一次，位置完全相同 */
.vessel{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);
  width:min(30vw,330px);}
.vessel img{width:100%;animation:float 9s cubic-bezier(0.65,0,0.35,1) infinite;}
@keyframes float{
  0%,3%{transform:translateY(0) rotate(-0.4deg);}
  47%,53%{transform:translateY(-14px) rotate(0.4deg);}
  97%,100%{transform:translateY(0) rotate(-0.4deg);}}

/* void 側的瓶：光的呼吸 */
.world-void .halo{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
  width:160%;height:160%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(165,105,245,0.55) 0%,rgba(95,125,235,0.20) 46%,transparent 70%);
  filter:blur(46px);animation:halo-breathe 9s cubic-bezier(0.65,0,0.35,1) infinite;}
@keyframes halo-breathe{
  0%,3%{opacity:calc(0.30 * var(--lean-void,1));transform:translate(-50%,-50%) scale(0.9);}
  47%,53%{opacity:calc(1 * var(--lean-void,1));transform:translate(-50%,-50%) scale(1.16);}
  97%,100%{opacity:calc(0.30 * var(--lean-void,1));transform:translate(-50%,-50%) scale(0.9);}}
.world-void .vessel img{filter:drop-shadow(0 34px 64px rgba(60,40,120,0.5));}

/* paper 側的瓶：墨的拓印 · 反相成版畫 */
.world-paper .vessel img{
  filter:invert(1) grayscale(0.82) sepia(0.38) contrast(0.92) brightness(1.04);
  mix-blend-mode:multiply;animation-delay:0s;}
.world-paper .halo{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);
  width:140%;height:140%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(168,137,92,0.30) 0%,rgba(139,58,31,0.10) 48%,transparent 70%);
  filter:blur(40px);animation:ink-breathe 9s cubic-bezier(0.65,0,0.35,1) infinite;animation-delay:-4.5s;}
@keyframes ink-breathe{
  0%,3%{opacity:0.25;transform:translate(-50%,-50%) scale(0.92);}
  47%,53%{opacity:0.8;transform:translate(-50%,-50%) scale(1.1);}
  97%,100%{opacity:0.25;transform:translate(-50%,-50%) scale(0.92);}}

/* 思側的墨影 —— 與器側紫暈相對的地上陰影，跟著漂浮反相呼吸 */
.world-paper .ground{position:absolute;left:50%;bottom:-34px;transform:translateX(-50%);
  width:62%;height:22px;border-radius:50%;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(26,24,22,0.4) 0%,rgba(139,58,31,0.12) 55%,transparent 72%);
  filter:blur(7px);animation:ground-breathe 9s cubic-bezier(0.65,0,0.35,1) infinite;animation-delay:0s;}
@keyframes ground-breathe{
  0%,3%{opacity:calc(0.9 * var(--lean-paper,1));transform:translateX(-50%) scaleX(1);}
  47%,53%{opacity:calc(0.38 * var(--lean-paper,1));transform:translateX(-50%) scaleX(0.84);}
  97%,100%{opacity:calc(0.9 * var(--lean-paper,1));transform:translateX(-50%) scaleX(1);}}

/* ═══ 大字 VAS. —— 同一位置、兩種材質 ═══ */
.wordmark{position:absolute;left:50%;top:24%;transform:translate(-50%,-50%);
  font-size:clamp(90px,11vw,150px);font-weight:300;line-height:1;letter-spacing:-0.02em;
  white-space:nowrap;z-index:5;pointer-events:none;}
.world-void .wordmark{font-family:var(--serif-en);color:var(--ash-0);}
.world-void .wordmark em{font-style:normal;font-weight:500;color:var(--aurora-v);}
.world-paper .wordmark{font-family:var(--t-serif-en);color:var(--ink);}
.world-paper .wordmark em{font-style:normal;font-weight:500;color:var(--rust);}

/* ═══ 左側 · 器 ═══ */
.side{position:absolute;top:50%;z-index:6;display:block;}
.side-void{left:6vw;transform:translateY(-50%);max-width:30vw;}
.side .kick{font-family:var(--mono);font-size:11px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--ash-3);margin-bottom:26px;white-space:nowrap;}
.side .line{font-size:clamp(17px,1.8vw,22px);line-height:1.9;color:var(--ash-1);
  min-height:3.8em;max-width:17ch;}
.side .line .caret{display:inline-block;width:1px;height:1.1em;vertical-align:-0.18em;
  background:var(--aurora-v);margin-left:2px;animation:caret 1.1s step-end infinite;}
@keyframes caret{0%,100%{opacity:1;}50%{opacity:0;}}
.side .enter{display:inline-flex;align-items:center;gap:12px;margin-top:34px;
  font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--ash-2);
  transition:color .3s,gap .3s;}
.side .enter .ln{width:38px;height:1px;background:var(--ash-4);transition:width .3s,background .3s;}
.side:hover .enter{color:var(--ash-0);gap:16px;}
.side:hover .enter .ln{width:54px;background:var(--aurora-v);}

/* ═══ 右側 · 思 ═══ */
.side-paper{right:6vw;transform:translateY(-50%);max-width:30vw;text-align:right;
  font-family:var(--t-serif);}
.side-paper .kick{color:var(--rust);opacity:0.75;}
.side-paper .line{color:var(--ink-1);margin-left:auto;}
.side-paper .line .caret{background:var(--rust);}
.side-paper .enter{color:var(--ink-2);flex-direction:row-reverse;}
.side-paper .enter .ln{background:var(--ink-4);}
.side-paper:hover .enter{color:var(--ink);}
.side-paper:hover .enter .ln{background:var(--rust);}

/* ═══ 版口 ═══ */
.corner{position:absolute;font-family:var(--mono);font-size:10px;letter-spacing:0.18em;z-index:6;white-space:nowrap;}
.corner.tl{top:34px;left:6vw;display:flex;align-items:center;gap:12px;color:var(--ash-1);font-family:var(--serif-en);font-size:15px;font-weight:500;letter-spacing:0.02em;}
.corner.tl .dot{width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle,var(--aurora-v),transparent 70%);
  box-shadow:0 0 10px rgba(196,113,245,0.7);animation:dot-breathe 6s ease-in-out infinite;}
@keyframes dot-breathe{0%,100%{opacity:.6;}50%{opacity:1;}}
.corner.tr{top:34px;right:6vw;color:var(--ink-2);}
.corner.bl{bottom:34px;left:6vw;color:var(--ash-3);}
.corner.br{bottom:34px;right:6vw;color:var(--ink-2);font-family:var(--t-serif-en);
  font-style:italic;font-size:12px;letter-spacing:0.06em;}

/* 縫底的提示 —— 跨縫居中，兩世界各寫一次變色 */
.seam-hint{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:10px;letter-spacing:0.24em;white-space:nowrap;z-index:6;}
.world-void .seam-hint{color:var(--ash-3);}
.world-paper .seam-hint{color:var(--ink-2);}

/* 語言選單 —— 桌機跨縫居中（與底部 seam-hint 對稱），mix-blend 讓字在光墨兩側都反相可讀；
   置於門熱區之上（z-index>門 20）才點得到 */
.langsel{position:absolute;top:34px;left:50%;transform:translateX(-50%);z-index:40;
  display:flex;gap:11px;font-family:var(--mono);font-size:11px;letter-spacing:0.14em;
  color:#fff;mix-blend-mode:difference;white-space:nowrap;}
.langsel a{opacity:0.5;transition:opacity .3s;cursor:pointer;}
.langsel a:hover{opacity:0.85;}
.langsel .on{opacity:1;font-weight:500;}

/* ═══ 入口＝兩側字塊本身（.side 為 <a>）；不再用撐滿半邊的隱形門 ═══ */

/* 進場 */
.rise{opacity:0;animation:rise 1.8s ease forwards;}
.d1{animation-delay:.3s;}.d2{animation-delay:.6s;}.d3{animation-delay:1s;}.d4{animation-delay:1.4s;}
@keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.vessel.rise{animation-name:rise-v;}
@keyframes rise-v{from{opacity:0;transform:translate(-50%,-46%);}to{opacity:1;transform:translate(-50%,-50%);}}
.wordmark.rise{animation-name:rise-w;}
@keyframes rise-w{from{opacity:0;transform:translate(-50%,-44%);}to{opacity:1;transform:translate(-50%,-50%);}}

/* ═══ 行動版：上下鏡像 ═══ */
@media(max-width:768px){
  :root{--seam:50%;}
  .world-void{clip-path:inset(0 0 calc(100% - var(--seam)) 0);}
  .world-paper{clip-path:inset(var(--seam) 0 0 0);}
  .seam-line{left:0;right:0;top:var(--seam);bottom:auto;width:auto;height:1px;
    background:linear-gradient(to right,transparent,rgba(196,113,245,0.4) 35%,rgba(168,137,92,0.5) 65%,transparent);}
  .seam-line::after{display:none;}
  .wordmark{display:block;left:8vw;top:12%;transform:none;
    font-size:clamp(52px,15vw,80px);}
  .wordmark.rise{animation-name:rise-wm;}
  @keyframes rise-wm{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .vessel{width:min(40vw,175px);top:56%;}
  .side-void{left:8vw;right:8vw;top:24%;max-width:none;transform:none;}
  .side-void .kick{margin-bottom:16px;}
  .side .enter{margin-top:20px;}
  .side-paper{left:8vw;right:8vw;top:auto;bottom:6%;max-width:none;text-align:left;transform:none;}
  .side-paper .line{margin-left:0;}
  .side-paper .enter{flex-direction:row;}
  .corner.tr,.corner.bl{display:none;}
  .corner.br{bottom:16px;}
  .seam-hint{display:none;}
  /* 行動版：移到右上角，沿用器側 .top .lang 的單色做法（上半為器/光側，深底） */
  .langsel{left:auto;right:8vw;transform:none;mix-blend-mode:normal;color:var(--ash-2);gap:9px;}
  .langsel a{opacity:0.7;}
  .langsel .on{opacity:1;color:var(--ash-0);}
  /* 行動版兩個半瓶疊在同一位置——浮沉改為同相，瓶身才是完整的一座 */
  .world-paper .vessel img{animation-delay:0s;}
  .world-paper .ground{animation-delay:0s;}
}

/* 進場跑完後固定終態（截圖引擎、回頁皆穩定） */
body.settled .rise{animation:none;opacity:1;}
body.settled .vessel.rise{transform:translate(-50%,-50%);}
body.settled .wordmark.rise{transform:translate(-50%,-50%);}
@media(max-width:768px){
  body.settled .wordmark.rise{transform:none;}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
  .rise{opacity:1;}
  .side .line .caret{display:none;}
}
</style>

(function(){
  var reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  setTimeout(function(){ document.body.classList.add('settled'); }, reduced ? 0 : 3300);
  var mobile  = matchMedia('(max-width: 768px)').matches;
  var mirror  = document.getElementById('mirror');

  /* ── 鏡面：閒置時自體流動（桌機左右、手機上下）；游標／指尖探進任一側的字塊熱區，那一側才展開 ── */
  var current = 50, target = 50, t0 = performance.now();
  if(!reduced){
    var ampM = 10, hiM = 70, loM = 47, lastTouch = 0;
    function calcSweep(){
      /* 行動版掃描範圍：下探到瓶底上縮 26px（不遮「思」標），上收到中線上方 20px */
      var h = Math.min(innerWidth * 0.40, 175);
      hiM = Math.min(74, (innerHeight * 0.56 + h / 2 - 26) / innerHeight * 100);
      loM = (innerHeight * 0.50 - 20) / innerHeight * 100;
    }
    /* 兩側的字塊就是熱區，也是門：滑到它才展開、點它才進入 */
    var voidCard  = document.querySelector('.side-void');
    var paperCard = document.querySelector('.side-paper');
    var hover = 0, lastHoverT = -1e4;  /* 1=器（光）展開 · -1=思（墨）展開 · 0=自體流動 · lastHoverT=放開時刻 */
    function inCard(el, x, y){
      if(!el) return false;
      var r = el.getBoundingClientRect();
      var padX = 56, padY = 44;        /* 寬鬆一點，邊緣不必精準對齊 */
      return x >= r.left - padX && x <= r.right + padX
          && y >= r.top - padY && y <= r.bottom + padY;
    }
    var FLOW_AMP = 10, OPEN_VOID = 61, OPEN_PAPER = 39;
    function measure(){
      var wm = document.querySelector('.world-void .wordmark');
      if(wm){
        var r = wm.getBoundingClientRect();
        FLOW_AMP = r.width / 2 / innerWidth * 100 + 1.5;   /* 流動頂到大字 LOGO 左右緣外一點點，兩側 LOGO 都完整顯示 */
      }
      var vr = voidCard  && voidCard.getBoundingClientRect();
      var pr = paperCard && paperCard.getBoundingClientRect();
      var voidRight = vr ? vr.right / innerWidth * 100 : 36;   /* 器字塊右緣 */
      var paperLeft = pr ? pr.left  / innerWidth * 100 : 64;   /* 思字塊左緣 */
      OPEN_VOID  = Math.min(50 + FLOW_AMP + 3, paperLeft - 0.5);  /* hover 再多展一點，但不剪到對側字塊 */
      OPEN_PAPER = Math.max(50 - FLOW_AMP - 3, voidRight + 0.5);
    }
    if(!mobile){
      measure();
      addEventListener('resize', measure);
      setTimeout(measure, 500);                                 /* 字型載入後重量 */
      addEventListener('mousemove', function(e){
        hover = inCard(voidCard, e.clientX, e.clientY) ? 1
              : inCard(paperCard, e.clientX, e.clientY) ? -1 : 0;
      });
      document.documentElement.addEventListener('mouseleave', function(){ hover = 0; });
    } else {
      calcSweep();
      addEventListener('resize', calcSweep);
      addEventListener('touchmove', function(e){
        lastTouch = performance.now();
        var ry = (e.touches[0].clientY / innerHeight - 0.5) * 2;
        /* 指尖在上→光拓寬；在下→墨拓寬；夾在不剪到文字與瓶底極限之間 */
        target = Math.max(46, Math.min(hiM, 50 - ry * ampM));
      }, {passive:true});
    }
    var vimg = document.querySelector('.world-void .vessel img');   /* 線跟著這座瓶的升降呼吸 */
    (function tick(){
      var now = performance.now();
      if(!mobile){
        if(hover === 1)       target = OPEN_VOID;     /* 滑進器的字塊→光拓寬 */
        else if(hover === -1) target = OPEN_PAPER;    /* 滑進思的字塊→墨拓寬 */
        else {
          /* 與瓶的浮沉成對：升到頂→器（光）拓寬、光暈正盛；沉到底→思（墨）拓寬、影子沉澱。直接讀瓶的真實 translateY，連呼吸曲線都繼承 */
          var ty = vimg ? new DOMMatrixReadOnly(getComputedStyle(vimg).transform).m42 : 0;
          var frac = Math.min(1, Math.max(0, ty / -14));   /* 0=沉到底 · 1=升到頂（對應 @keyframes float 的 -14px） */
          target = 50 - FLOW_AMP + frac * 2 * FLOW_AMP;     /* 光往上：頂→50+amp（器寬）· 影往下：底→50-amp（思寬） */
        }
      } else if(now - lastTouch > 1800){
        /* 行動版閒置自體呼吸：在 loM↔hiM 之間掃描（9 秒週期，與光暈同步） */
        var mid = (loM + hiM) / 2, a = (hiM - loM) / 2;
        target = mid + Math.sin((now - t0) / 9000 * Math.PI * 2) * a;
      }
      var k = 0.3;                                   /* 自體流動緊跟瓶：大=貼瓶緩動、小=更鬆（太小會抹平成均速） */
      if(hover !== 0){ lastHoverT = now; k = 0.06; } /* hover 拉開速度：小=慢柔、大=快 */
      else if(now - lastHoverT < 600){ k = 0.06; }   /* 放開後柔順回流窗（ms）：調慢速度時跟著放大 */
      current += (target - current) * k;
      mirror.style.setProperty('--seam', current.toFixed(3) + '%');
      /* 偏向哪邊，那邊的光／影呼吸得更滿 */
      var a = mobile ? ampM : (FLOW_AMP + 3);
      var leanV = 1 + Math.max(0, current - 50) / a * 0.7;
      var leanP = 1 + Math.max(0, 50 - current) / a * 0.7;
      mirror.style.setProperty('--lean-void',  leanV.toFixed(3));
      mirror.style.setProperty('--lean-paper', leanP.toFixed(3));
      requestAnimationFrame(tick);
    })();
  }

  /* ── 打字 ── */
  var voidLine  = '给那些未能用文字明说的当下。';
  var paperLine = '容器，是让对立得以相遇而不爆裂的边界本身。';
  var elV = document.getElementById('type-void'),
      elP = document.getElementById('type-paper'),
      cV  = document.getElementById('caret-void'),
      cP  = document.getElementById('caret-paper');
  if(reduced){
    elV.textContent = voidLine; elP.textContent = paperLine;
  } else {
    var typeInto = function(el, text, done){
      var i = 0;
      (function step(){
        if(i <= text.length){
          el.textContent = text.slice(0, i); i++;
          setTimeout(step, 90 + Math.random()*70);
        } else if(done){ done(); }
      })();
    };
    setTimeout(function(){
      typeInto(elV, voidLine, function(){
        cV.style.visibility = 'hidden';
        cP.style.visibility = 'visible';
        typeInto(elP, paperLine, function(){
          cP.style.visibility = 'hidden';
        });
      });
    }, 1600);
  }
})();
</script>

</body>
</html>
