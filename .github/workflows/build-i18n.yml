name: Build i18n static pages

on:
  push:
    branches: [main]
    paths:
      - 'i18n/**'
      - '*.html'
      - 'build-i18n.js'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate language pages
        run: node build-i18n.js

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add en/ ja/ cn/
          git diff --staged --quiet || git commit -m "build: 自動更新 en/ja/cn 靜態語言頁面"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
