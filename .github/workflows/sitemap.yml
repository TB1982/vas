name: Generate sitemap

# 每次 main 有頁面變動就重產 sitemap，lastmod 由 git 自動決定。
# paths-ignore: sitemap.xml —— bot 只改 sitemap.xml 的那次 commit 不會再觸發自己（防迴圈）。

on:
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git-derived lastmod)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate sitemap
        run: python3 tools/gen_sitemap.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml 無變化，跳過"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "自動更新 sitemap（lastmod 跟隨 git）"
          git push
